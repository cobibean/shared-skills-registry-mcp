name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  PIP_CONSTRAINT: ${{ github.workspace }}/requirements/ci-constraints.txt

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/ci-constraints.txt

      - name: Verify the tag matches the package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              raise SystemExit(f"tag {tag!r} does not match pyproject version {version!r}")
          PY

      - name: Build sdist and wheel without undeclared build state
        run: |
          python -m pip install -c requirements/ci-constraints.txt build hatchling twine
          python -m build --sdist --wheel --no-isolation
          python -m twine check --strict dist/*
          python - <<'PY'
          from pathlib import Path
          import tarfile
          sdist = next(Path("dist").glob("*.tar.gz"))
          required = {
              "README.md",
              "SECURITY.md",
              "CONTRIBUTING.md",
              "THIRD_PARTY_NOTICES.md",
              "docs/THREAT-MODEL.md",
              "docs/KNOWN-LIMITATIONS.md",
              "docs/RELEASE-CHECKLIST.md",
              "pyproject.toml",
          }
          with tarfile.open(sdist) as archive:
              names = archive.getnames()
          missing = sorted(item for item in required if not any(name.endswith("/" + item) for name in names))
          leaked = sorted(name for name in names if "/.agent/" in name or "/docs/memory/" in name)
          if missing:
              raise SystemExit(f"sdist missing release files: {missing}")
          if leaked:
              raise SystemExit(f"sdist contains internal project records: {leaked}")
          PY

      - name: Install wheel into a separate clean environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/open-ssr-release-venv
          /tmp/open-ssr-release-venv/bin/pip install \
            -c "$GITHUB_WORKSPACE/requirements/ci-constraints.txt" \
            dist/*.whl
          test -x /tmp/open-ssr-release-venv/bin/shared-skills-registry-http
          test -x /tmp/open-ssr-release-venv/bin/shared-skills-registry-stdio
          /tmp/open-ssr-release-venv/bin/python - <<'PY'
          from importlib.resources import files
          notice = files("shared_skills_registry_mcp").joinpath("_bundled/THIRD_PARTY_NOTICES.md")
          text = notice.read_text(encoding="utf-8")
          if "Third-party notices" not in text or "superpowers" not in text:
              raise SystemExit("packaged third-party notice verification failed")
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/shared-skills-registry-mcp
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist

  github-release:
    name: Create GitHub prerelease
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: Create prerelease with artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          test -f "$notes"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --prerelease \
            --title "Open SSR $GITHUB_REF_NAME" \
            --notes-file "$notes"
